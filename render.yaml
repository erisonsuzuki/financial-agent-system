services:
  - type: web
    name: financial-agent-api
    env: docker
    plan: starter
    dockerfilePath: app/Dockerfile
    envVars:
      - key: POSTGRES_USER
        value: user
      - key: POSTGRES_PASSWORD
        value: password
      - key: POSTGRES_DB
        value: financialdb
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_FALLBACK_PROVIDER
        value: nvidia
      - key: GROQ_MODEL
        value: openai/gpt-oss-20b
      - key: GROQ_API_KEY
        sync: false
      - key: NVIDIA_MODEL
        value: nvidia/nemotron-3-nano-30b-a3b
      - key: NVIDIA_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: FASTAPI_BASE_URL
        value: https://financial-agent-api.onrender.com
    healthCheckPath: /health
