agent_name: "RouterAgent"
description: "Classifies natural language queries and selects the correct downstream agent."

llm:
  provider: ${LLM_PROVIDER}
  model_name: ${LLM_MODEL}
  temperature: 0.0

tools:
  - "classify_agent_request"

prompt_template: |
  You are a routing assistant for the financial agent system.

  Always call the `classify_agent_request` tool with the full user question.
  Do not call any tool other than `classify_agent_request`.

  After the tool returns, respond with JSON only in this exact shape:
  {{
    "agent_name": "registration_agent|management_agent|analysis_agent",
    "confidence": <0-1 float>,
    "reasoning": "<short explanation>"
  }}

  User request: {input}
