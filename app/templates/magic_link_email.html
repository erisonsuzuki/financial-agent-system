<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your sign-in link</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f4f4f5; margin: 0; padding: 0;">
  <table role="presentation" width="100%" border="0" cellspacing="0" cellpadding="0">
    <tr>
      <td align="center" style="padding: 40px 20px;">
        <table role="presentation" width="100%" border="0" cellspacing="0" cellpadding="0" style="max-width: 600px; background-color: #ffffff; border-radius: 8px; border: 1px solid #e4e4e7; overflow: hidden;">
          <tr>
            <td style="padding: 30px 40px; background-color: #000000; text-align: center;">
              <h1 style="color: #ffffff; margin: 0; font-size: 24px; font-weight: 700;">Financial Agent System</h1>
            </td>
          </tr>
          <tr>
            <td style="padding: 40px 40px 20px 40px;">
              <h2 style="color: #18181b; margin-top: 0; margin-bottom: 20px; font-size: 20px;">Sign in to Financial Agent System</h2>
              <p style="color: #3f3f46; font-size: 16px; line-height: 26px; margin-bottom: 30px;">
                We received a request to sign in to your account. Use the button below to continue.
              </p>
              <table role="presentation" border="0" cellspacing="0" cellpadding="0" style="margin-bottom: 30px; width: 100%;">
                <tr>
                  <td align="center">
                    <a href="{{MAGIC_LINK_URL}}" target="_blank" style="display: inline-block; padding: 16px 32px; background-color: #2563eb; color: #ffffff; text-decoration: none; font-weight: 600; font-size: 16px; border-radius: 6px;">
                      Continue
                    </a>
                  </td>
                </tr>
              </table>
              <p style="color: #71717a; font-size: 14px; line-height: 22px; margin-top: 30px; border-top: 1px solid #e4e4e7; padding-top: 20px;">
                If the button does not work, copy and paste this link into your browser:<br><br>
                <a href="{{MAGIC_LINK_URL}}" style="color: #2563eb; font-size: 12px; word-break: break-all;">{{MAGIC_LINK_URL}}</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
